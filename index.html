<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f2ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --surface2: #f0ece6;
    --border: #e0d9cf;
    --text: #1a1714;
    --text2: #6b6459;
    --text3: #9e9388;
    --accent: #2d5a3d;
    --accent-light: #e8f0eb;
    --danger: #b84040;
    --danger-light: #f5e8e8;
    --income: #2d5a3d;
    --expense: #b84040;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  /* ── Layout ── */
  #app { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }

  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .header-row {
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
    color: var(--text);
  }

  .month-nav {
    display: flex; align-items: center; gap: 10px;
  }

  .month-nav button {
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 18px; padding: 4px 8px;
    border-radius: var(--radius-sm); transition: background 0.15s;
  }
  .month-nav button:hover { background: var(--surface2); }

  .month-label {
    font-size: 13px; font-weight: 600; color: var(--text2);
    min-width: 90px; text-align: center; letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── Nav tabs ── */
  .tabs {
    display: flex; gap: 0;
    padding: 12px 20px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 57px; z-index: 40;
  }
  .tab {
    flex: 1; padding: 8px 0 10px; text-align: center;
    font-size: 12px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; cursor: pointer; color: var(--text3);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Content ── */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px;
    margin-bottom: 12px;
  }

  .card-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }

  .big-num {
    font-family: 'DM Mono', monospace;
    font-size: 32px; font-weight: 400; letter-spacing: -1px;
    color: var(--text);
  }
  .big-num.green { color: var(--income); }
  .big-num.red { color: var(--expense); }

  /* ── Overview grid ── */
  .overview-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 12px;
  }
  .overview-grid .card { margin-bottom: 0; }

  /* ── Budget bar ── */
  .budget-bar-wrap { margin-top: 14px; }
  .budget-bar-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text2); margin-bottom: 6px;
  }
  .budget-bar-bg {
    height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden;
  }
  .budget-bar-fill {
    height: 100%; border-radius: 99px; transition: width 0.4s ease;
    background: var(--accent);
  }
  .budget-bar-fill.over { background: var(--expense); }

  /* ── Section header ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text3);
  }

  /* ── Entry list ── */
  .entry-list { display: flex; flex-direction: column; gap: 2px; }

  .entry-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    background: var(--surface);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .entry-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .entry-dot.income { background: var(--income); }
  .entry-dot.expense { background: var(--expense); }

  .entry-cat { font-size: 14px; font-weight: 600; flex: 1; }
  .entry-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .entry-amount {
    font-family: 'DM Mono', monospace;
    font-size: 14px; font-weight: 400;
  }
  .entry-amount.income { color: var(--income); }
  .entry-amount.expense { color: var(--expense); }

  .entry-del {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 16px; padding: 0 2px;
    opacity: 0; transition: opacity 0.15s;
  }
  .entry-item:hover .entry-del { opacity: 1; }

  /* ── Category breakdown ── */
  .cat-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-name { flex: 1; font-size: 14px; }
  .cat-bar-bg {
    width: 80px; height: 4px; background: var(--surface2); border-radius: 99px;
  }
  .cat-bar-fill {
    height: 100%; border-radius: 99px; background: var(--expense);
    transition: width 0.4s;
  }
  .cat-amount {
    font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text2);
    min-width: 70px; text-align: right;
  }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 88px; right: 50%;
    transform: translateX(50%); max-width: 480px; width: calc(100% - 40px);
    background: var(--accent); color: white;
    border: none; border-radius: 14px;
    padding: 16px; font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; box-shadow: 0 4px 20px rgba(45,90,61,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .fab:active { transform: translateX(50%) scale(0.97); box-shadow: 0 2px 10px rgba(45,90,61,0.25); }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    max-width: 480px; width: 100%;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 60;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .nav-btn {
    flex: 1; padding: 12px 0; background: none; border: none;
    cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--text3);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: color 0.15s;
  }
  .nav-btn .icon { font-size: 18px; }
  .nav-btn.active { color: var(--accent); }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    backdrop-filter: blur(2px); z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px; padding: 24px 20px 32px;
    transform: translateY(20px); transition: transform 0.25s ease;
    max-height: 90dvh; overflow-y: auto;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 99px; margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 18px; font-weight: 700; margin-bottom: 20px;
  }

  /* ── Form ── */
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3);
    margin-bottom: 6px;
  }

  .field input, .field select {
    width: 100%; padding: 12px 14px;
    background: var(--surface2); border: 1.5px solid transparent;
    border-radius: var(--radius-sm); font-family: 'DM Mono', monospace;
    font-size: 15px; color: var(--text); outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }

  .type-toggle {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .type-btn {
    padding: 12px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--surface2);
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; color: var(--text2);
  }
  .type-btn.active-income {
    background: var(--accent-light); border-color: var(--income); color: var(--income);
  }
  .type-btn.active-expense {
    background: var(--danger-light); border-color: var(--expense); color: var(--expense);
  }

  .cat-chips {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;
  }
  .chip {
    padding: 6px 12px; border-radius: 99px;
    border: 1.5px solid var(--border); background: var(--surface2);
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; color: var(--text2);
  }
  .chip.selected { background: var(--accent); border-color: var(--accent); color: white; }
  .chip.add-chip { border-style: dashed; }

  .btn-primary {
    width: 100%; padding: 16px; border-radius: var(--radius-sm);
    background: var(--accent); color: white; border: none;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px; transition: opacity 0.15s;
  }
  .btn-primary:disabled { opacity: 0.4; }

  .btn-secondary {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text2); border: none;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: background 0.15s;
  }

  /* ── Settings ── */
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 14px; font-weight: 600; }
  .setting-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .inline-input {
    font-family: 'DM Mono', monospace; font-size: 15px;
    background: var(--surface2); border: 1.5px solid transparent;
    border-radius: var(--radius-sm); padding: 8px 12px;
    color: var(--text); outline: none; width: 130px; text-align: right;
    transition: border-color 0.15s;
  }
  .inline-input:focus { border-color: var(--accent); }

  .danger-btn {
    padding: 10px 16px; border-radius: var(--radius-sm);
    background: var(--danger-light); color: var(--danger); border: none;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px;
  }

  .action-btn {
    padding: 10px 16px; border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text2); border: none;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px;
  }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text3);
    font-size: 14px; line-height: 1.6;
  }
  .empty-state .emoji { font-size: 32px; margin-bottom: 10px; }

  /* ── New cat inline ── */
  .new-cat-row {
    display: flex; gap: 8px; margin-top: 8px;
  }
  .new-cat-row input {
    flex: 1; padding: 8px 12px;
    background: var(--surface2); border: 1.5px solid var(--accent);
    border-radius: var(--radius-sm); font-family: 'Syne', sans-serif;
    font-size: 13px; color: var(--text); outline: none;
  }
  .new-cat-row button {
    padding: 8px 14px; background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm); font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }

  /* ── Cat management list ── */
  .cat-manage-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .cat-manage-item:last-child { border-bottom: none; }

  /* ── Inline confirm ── */
  .confirm-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .confirm-row span { font-size: 12px; color: var(--text2); }
  .confirm-yes {
    padding: 6px 12px; border-radius: var(--radius-sm);
    background: var(--danger); color: white; border: none;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer;
  }
  .confirm-no {
    padding: 6px 12px; border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text2); border: none;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer;
  }

  .cat-type-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
    text-transform: uppercase; padding: 3px 8px; border-radius: 99px;
  }
  .cat-type-badge.income { background: var(--accent-light); color: var(--income); }
  .cat-type-badge.expense { background: var(--danger-light); color: var(--expense); }

  /* ── Pie chart ── */
  .pie-wrap {
    display: flex; align-items: center; gap: 20px; margin-bottom: 16px;
  }
  .pie-wrap svg { flex-shrink: 0; }
  .pie-legend { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .pie-legend-item {
    display: flex; align-items: center; gap: 8px; font-size: 12px;
  }
  .pie-legend-dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  }
  .pie-legend-name { flex: 1; font-weight: 600; }
  .pie-legend-pct { font-family: 'DM Mono', monospace; color: var(--text3); font-size: 11px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-row">
      <span class="logo">Budget</span>
      <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span class="month-label" id="monthLabel"></span>
        <button id="nextMonth">›</button>
      </div>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="overview">Overview</div>
    <div class="tab" data-tab="entries">Entries</div>
    <div class="tab" data-tab="settings">Settings</div>
  </div>

  <!-- Overview Page -->
  <div class="page active" id="page-overview">
    <div class="overview-grid">
      <div class="card">
        <div class="card-label">Income</div>
        <div class="big-num green" id="ov-income">$0</div>
      </div>
      <div class="card">
        <div class="card-label">Expenses</div>
        <div class="big-num red" id="ov-expense">$0</div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Net</div>
      <div class="big-num" id="ov-net">$0</div>
      <div class="budget-bar-wrap" id="budget-bar-section">
        <div class="budget-bar-label">
          <span id="bar-spent">$0 spent</span>
          <span id="bar-budget">Budget: $0</span>
        </div>
        <div class="budget-bar-bg">
          <div class="budget-bar-fill" id="budget-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="card" id="cat-breakdown-card">
      <div class="section-header">
        <span class="section-title">Expenses by Category</span>
      </div>
      <canvas id="pie-chart" style="display:none"></canvas>
      <div id="pie-container" style="display:none" class="pie-wrap">
        <svg id="pie-svg" width="140" height="140" viewBox="0 0 140 140"></svg>
        <div class="pie-legend" id="pie-legend"></div>
      </div>
      <div id="cat-breakdown"></div>
    </div>
  </div>

  <!-- Entries Page -->
  <div class="page" id="page-entries">
    <div class="section-header">
      <span class="section-title">All Entries</span>
    </div>
    <div class="entry-list" id="entry-list"></div>
  </div>

  <!-- Settings Page -->
  <div class="page" id="page-settings">
    <div class="card">
      <div class="section-title" style="margin-bottom:14px">Monthly Budget</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Budget for <span id="settings-month-label"></span></div>
          <div class="setting-sub">Set to 0 to disable</div>
        </div>
        <input type="number" class="inline-input" id="budget-input" placeholder="0" min="0">
      </div>
    </div>

    <div class="card">
      <div class="section-title" style="margin-bottom:14px">Categories</div>
      <div id="cat-manage-list"></div>
      <div style="margin-top:14px">
        <div class="new-cat-row">
          <input type="text" id="new-cat-input" placeholder="New category...">
          <button id="add-cat-btn">Add</button>
        </div>
        <div class="type-toggle" style="margin-top:8px">
          <button class="type-btn active-expense" id="new-cat-type-expense" onclick="setNewCatType('expense')">Expense</button>
          <button class="type-btn" id="new-cat-type-income" onclick="setNewCatType('income')">Income</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title" style="margin-bottom:14px">Data</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Export</div>
          <div class="setting-sub">Download all data as JSON</div>
        </div>
        <button class="action-btn" id="export-btn">Export</button>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Import</div>
          <div class="setting-sub">Merge from JSON file</div>
        </div>
        <button class="action-btn" id="import-btn">Import</button>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Clear all data</div>
          <div class="setting-sub">Cannot be undone</div>
        </div>
        <div id="clear-confirm-area">
          <button class="danger-btn" id="clear-btn">Clear</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab-btn">+ Add Entry</button>

<!-- Add Entry Modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">New Entry</div>

    <div class="field">
      <label>Type</label>
      <div class="type-toggle">
        <button class="type-btn active-income" id="type-income" onclick="setType('income')">Income</button>
        <button class="type-btn" id="type-expense" onclick="setType('expense')">Expense</button>
      </div>
    </div>

    <div class="field">
      <label>Amount</label>
      <input type="number" id="entry-amount" placeholder="0.00" min="0" step="0.01">
    </div>

    <div class="field">
      <label>Category</label>
      <div class="cat-chips" id="entry-cat-chips"></div>
    </div>

    <div class="field">
      <label>Date</label>
      <input type="date" id="entry-date">
    </div>

    <button class="btn-primary" id="save-entry-btn">Save Entry</button>
    <button class="btn-secondary" id="cancel-entry-btn">Cancel</button>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let state = {
  categories: [],
  entries: [],       // { id, type, amount, categoryId, date }
  budgets: {},       // { "2025-06": 2000, ... }
};

let currentDate = new Date();
let currentType = 'income';
let selectedCatId = null;
let showNewCatInModal = false;
let newCatType = 'expense'; // for settings panel

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Pie chart colors — a warm, distinct palette
const PIE_COLORS = [
  '#b84040','#2d5a3d','#c47a2b','#4a6fa5','#7a4f9e',
  '#3a8fa0','#c45c8a','#5a7a3a','#a05030','#3a5a8a',
];

// ─── Persistence ─────────────────────────────────────────────────────────────
function save() { localStorage.setItem('budget_v1', JSON.stringify(state)); }
function load() {
  const raw = localStorage.getItem('budget_v1');
  if (raw) {
    try { state = JSON.parse(raw); } catch(e) {}
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(d) { return `${SHORT_MONTHS[d.getMonth()]} ${d.getFullYear()}`; }
function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function uid() { return Math.random().toString(36).slice(2,9); }

function entriesForMonth(d) {
  const key = monthKey(d);
  return state.entries.filter(e => e.date.startsWith(key));
}

// ─── Pie chart ───────────────────────────────────────────────────────────────
function drawPie(data) {
  const svg = document.getElementById('pie-svg');
  const container = document.getElementById('pie-container');
  const legend = document.getElementById('pie-legend');

  if (!data.length) { container.style.display = 'none'; return; }
  container.style.display = 'flex';

  const total = data.reduce((s, d) => s + d.amount, 0);
  const cx = 70, cy = 70, r = 68; // pixel coords, SVG is 140x140
  let startAngle = -Math.PI / 2;
  let paths = '';

  data.forEach(({ amount, color }) => {
    const fraction = amount / total;
    const sweepAngle = fraction * 2 * Math.PI;
    const endAngle = startAngle + sweepAngle;

    if (data.length === 1) {
      paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}"/>`;
    } else {
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = sweepAngle > Math.PI ? 1 : 0;
      paths += `<path d="M${cx},${cy} L${x1.toFixed(3)},${y1.toFixed(3)} A${r},${r} 0 ${largeArc},1 ${x2.toFixed(3)},${y2.toFixed(3)} Z" fill="${color}"/>`;
    }
    startAngle += sweepAngle;
  });

  svg.setAttribute('viewBox', '0 0 140 140');
  svg.innerHTML = paths;

  const total2 = data.reduce((s, d) => s + d.amount, 0);
  legend.innerHTML = data.map(({ name, amount, color }) => {
    const pct = ((amount / total2) * 100).toFixed(1);
    return `<div class="pie-legend-item">
      <div class="pie-legend-dot" style="background:${color}"></div>
      <span class="pie-legend-name">${name}</span>
      <span class="pie-legend-pct">${pct}%</span>
    </div>`;
  }).join('');
}

// ─── Rendering ───────────────────────────────────────────────────────────────
function render() {
  renderHeader();
  renderOverview();
  renderEntries();
  renderSettings();
}

function renderHeader() {
  document.getElementById('monthLabel').textContent = monthLabel(currentDate);
}

function renderOverview() {
  const entries = entriesForMonth(currentDate);
  const income = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount, 0);
  const expense = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount, 0);
  const net = income - expense;
  const budget = state.budgets[monthKey(currentDate)] || 0;

  document.getElementById('ov-income').textContent = fmt(income);
  document.getElementById('ov-expense').textContent = fmt(expense);

  const netEl = document.getElementById('ov-net');
  netEl.textContent = (net < 0 ? '-' : '') + fmt(net);
  netEl.className = 'big-num' + (net < 0 ? ' red' : net > 0 ? ' green' : '');

  // Budget bar
  const barSection = document.getElementById('budget-bar-section');
  if (budget > 0) {
    barSection.style.display = '';
    const pct = Math.min((expense / budget) * 100, 100);
    const bar = document.getElementById('budget-bar');
    bar.style.width = pct + '%';
    bar.className = 'budget-bar-fill' + (expense > budget ? ' over' : '');
    document.getElementById('bar-spent').textContent = fmt(expense) + ' spent';
    document.getElementById('bar-budget').textContent = 'Budget: ' + fmt(budget);
  } else {
    barSection.style.display = 'none';
  }

  // Category breakdown (expenses only)
  const breakdown = {};
  entries.filter(e=>e.type==='expense').forEach(e => {
    const cat = state.categories.find(c=>c.id===e.categoryId);
    const name = cat ? cat.name : 'Uncategorized';
    breakdown[name] = (breakdown[name]||0) + e.amount;
  });

  const sorted = Object.entries(breakdown).sort((a,b)=>b[1]-a[1]);
  const maxVal = sorted[0]?.[1] || 1;
  const catEl = document.getElementById('cat-breakdown');

  // Pie chart
  const pieData = sorted.map(([name, amount], i) => ({
    name, amount, color: PIE_COLORS[i % PIE_COLORS.length]
  }));
  drawPie(pieData);

  // Build color map for bar rows
  const colorMap = {};
  pieData.forEach(d => { colorMap[d.name] = d.color; });

  if (sorted.length === 0) {
    catEl.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0">No expenses yet</div>';
  } else {
    catEl.innerHTML = sorted.map(([name, amt], i) => `
      <div class="cat-row">
        <span class="cat-name">${name}</span>
        <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${(amt/maxVal*100).toFixed(1)}%;background:${colorMap[name]}"></div></div>
        <span class="cat-amount">${fmt(amt)}</span>
      </div>
    `).join('');
  }
}

function renderEntries() {
  const entries = entriesForMonth(currentDate).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const el = document.getElementById('entry-list');

  if (entries.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="emoji">📭</div>No entries for ${monthLabel(currentDate)}</div>`;
    return;
  }

  el.innerHTML = entries.map(e => {
    const cat = state.categories.find(c=>c.id===e.categoryId);
    const catName = cat ? cat.name : 'Uncategorized';
    const d = new Date(e.date + 'T12:00:00');
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    const sign = e.type === 'income' ? '+' : '−';
    return `
      <div class="entry-item">
        <div class="entry-dot ${e.type}"></div>
        <span class="entry-cat">${catName}</span>
        <span class="entry-date">${dateStr}</span>
        <span class="entry-amount ${e.type}">${sign}${fmt(e.amount)}</span>
        <button class="entry-del" onclick="deleteEntry('${e.id}')">×</button>
      </div>
    `;
  }).join('');
}

function renderSettings() {
  document.getElementById('settings-month-label').textContent = monthLabel(currentDate);
  const budget = state.budgets[monthKey(currentDate)] || '';
  document.getElementById('budget-input').value = budget || '';

  // Category management
  const el = document.getElementById('cat-manage-list');
  if (state.categories.length === 0) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0">No categories yet</div>';
  } else {
    el.innerHTML = state.categories.map(c => `
      <div class="cat-manage-item">
        <span>${c.name}</span>
        <span class="cat-type-badge ${c.type||'expense'}">${c.type||'expense'}</span>
        <button class="danger-btn" style="padding:6px 10px;font-size:11px" onclick="deleteCat('${c.id}')">Remove</button>
      </div>
    `).join('');
  }
}

// ─── Modal ───────────────────────────────────────────────────────────────────
function openModal() {
  selectedCatId = null;
  showNewCatInModal = false;
  document.getElementById('entry-amount').value = '';
  document.getElementById('entry-date').value = new Date().toISOString().slice(0,10);
  setType('income');
  renderCatChips();
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('entry-amount').focus(), 300);
}

function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function setType(t) {
  currentType = t;
  document.getElementById('type-income').className = 'type-btn' + (t==='income' ? ' active-income' : '');
  document.getElementById('type-expense').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
  selectedCatId = null;
  renderCatChips();
}

function renderCatChips() {
  const el = document.getElementById('entry-cat-chips');
  // Only show categories matching the selected entry type
  const cats = state.categories.filter(c => (c.type || 'expense') === currentType);

  if (cats.length === 0 && !showNewCatInModal) {
    el.innerHTML = `
      <div style="font-size:13px;color:var(--text3);margin-bottom:8px">No ${currentType} categories yet.</div>
      <span class="chip add-chip" onclick="showNewCatField()">+ New Category</span>
    `;
    return;
  }

  let html = cats.map(c => `
    <span class="chip${selectedCatId===c.id?' selected':''}" onclick="selectCat('${c.id}')">${c.name}</span>
  `).join('');
  html += `<span class="chip add-chip" onclick="showNewCatField()">+</span>`;

  if (showNewCatInModal) {
    html += `<div class="new-cat-row" style="width:100%;margin-top:4px">
      <input type="text" id="modal-new-cat" placeholder="Category name..." autofocus>
      <button onclick="addCatFromModal()">Add</button>
    </div>`;
  }

  el.innerHTML = html;
  if (showNewCatInModal) document.getElementById('modal-new-cat')?.focus();
}

function showNewCatField() { showNewCatInModal = true; renderCatChips(); }
function selectCat(id) { selectedCatId = id; renderCatChips(); }

function addCatFromModal() {
  const input = document.getElementById('modal-new-cat');
  const name = input?.value.trim();
  if (!name) return;
  const cat = { id: uid(), name, type: currentType };
  state.categories.push(cat);
  save();
  selectedCatId = cat.id;
  showNewCatInModal = false;
  renderCatChips();
  renderSettings();
}

function saveEntry() {
  const amount = parseFloat(document.getElementById('entry-amount').value);
  const date = document.getElementById('entry-date').value;
  if (!amount || amount <= 0 || !date) return;

  state.entries.push({ id: uid(), type: currentType, amount, categoryId: selectedCatId, date });
  save();
  closeModal();
  render();
}

function deleteEntry(id) {
  state.entries = state.entries.filter(e=>e.id!==id);
  save();
  render();
}

// ─── Categories ──────────────────────────────────────────────────────────────
function setNewCatType(t) {
  newCatType = t;
  document.getElementById('new-cat-type-expense').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
  document.getElementById('new-cat-type-income').className = 'type-btn' + (t==='income' ? ' active-income' : '');
}

function addCategory() {
  const input = document.getElementById('new-cat-input');
  const name = input.value.trim();
  if (!name) return;
  state.categories.push({ id: uid(), name, type: newCatType });
  input.value = '';
  save();
  renderSettings();
}

function deleteCat(id) {
  state.categories = state.categories.filter(c=>c.id!==id);
  save();
  renderSettings();
}

// ─── Budget ──────────────────────────────────────────────────────────────────
document.getElementById('budget-input').addEventListener('input', e => {
  const val = parseFloat(e.target.value) || 0;
  state.budgets[monthKey(currentDate)] = val;
  save();
  renderOverview();
});

// ─── Import / Export ─────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `budget-export-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
});

document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      // Merge entries by id
      const existingIds = new Set(state.entries.map(e=>e.id));
      (imported.entries||[]).forEach(e => { if(!existingIds.has(e.id)) state.entries.push(e); });
      // Merge categories
      const existingCatIds = new Set(state.categories.map(c=>c.id));
      (imported.categories||[]).forEach(c => { if(!existingCatIds.has(c.id)) state.categories.push(c); });
      // Merge budgets
      Object.assign(state.budgets, imported.budgets||{});
      save(); render();
      alert('Import successful!');
    } catch { alert('Invalid file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function setupClearBtn() {
  const btn = document.getElementById('clear-btn');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const area = document.getElementById('clear-confirm-area');
    area.innerHTML = `
      <div class="confirm-row">
        <span>Are you sure?</span>
        <button class="confirm-yes" id="confirm-yes-btn">Yes, clear</button>
        <button class="confirm-no" id="confirm-no-btn">Cancel</button>
      </div>`;
    document.getElementById('confirm-yes-btn').addEventListener('click', () => {
      state = { categories: [], entries: [], budgets: {} };
      save(); render();
      area.innerHTML = '<button class="danger-btn" id="clear-btn">Clear</button>';
      setupClearBtn();
    });
    document.getElementById('confirm-no-btn').addEventListener('click', () => {
      area.innerHTML = '<button class="danger-btn" id="clear-btn">Clear</button>';
      setupClearBtn();
    });
  });
}

// ─── PWA: register service worker ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'budget-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./index.html', './manifest.json'])).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./index.html'))));
});`;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, {scope: './'}).catch(()=>{});
}

// ─── Navigation ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const t = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-'+t).classList.add('active');
    document.getElementById('fab-btn').style.display = t === 'settings' ? 'none' : '';
  });
});

document.getElementById('prevMonth').addEventListener('click', () => {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1);
  render();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1);
  render();
});

document.getElementById('fab-btn').addEventListener('click', openModal);
document.getElementById('add-cat-btn').addEventListener('click', addCategory);
document.getElementById('new-cat-input').addEventListener('keydown', e => { if(e.key==='Enter') addCategory(); });
document.getElementById('save-entry-btn').addEventListener('click', saveEntry);
document.getElementById('cancel-entry-btn').addEventListener('click', closeModal);

// Close modal on backdrop click
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) closeModal();
});

// ─── Init ────────────────────────────────────────────────────────────────────
load();
render();
setupClearBtn();
</script>
</body>
</html>
